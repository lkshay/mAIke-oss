# mAIke model configuration — loaded at startup, overrides constants.py defaults.
# Place a custom copy at ~/.config/maike/models.yaml or <workspace>/.maike/models.yaml.

providers:
  anthropic:
    default_model: claude-sonnet-4-6
    cheap_model: claude-haiku-4-5-20251001
    strong_model: claude-opus-4-20250514
    pricing:
      input_per_million_usd: 15.00
      output_per_million_usd: 75.00
    cheap_pricing:
      input_per_million_usd: 0.80
      output_per_million_usd: 4.00
    strong_pricing:
      input_per_million_usd: 15.00
      output_per_million_usd: 75.00

  openai:
    default_model: gpt-5.5
    cheap_model: gpt-5.5-mini
    strong_model: gpt-5.5
    pricing:
      input_per_million_usd: 2.50
      output_per_million_usd: 15.00
    cheap_pricing:
      input_per_million_usd: 0.40
      output_per_million_usd: 1.60
    strong_pricing:
      input_per_million_usd: 2.50
      output_per_million_usd: 15.00

  gemini:
    default_model: gemini-3-flash-preview
    cheap_model: gemini-2.5-flash
    strong_model: gemini-2.5-pro
    pricing:
      input_per_million_usd: 0.30
      output_per_million_usd: 2.50
    cheap_pricing:
      input_per_million_usd: 0.30
      output_per_million_usd: 2.50
    strong_pricing:
      input_per_million_usd: 1.25
      output_per_million_usd: 10.00

  ollama:
    default_model: "gemma4:latest"
    cheap_model: "gemma4:latest"
    strong_model: "gemma4:latest"
    pricing:
      input_per_million_usd: 0.0
      output_per_million_usd: 0.0
    cheap_pricing:
      input_per_million_usd: 0.0
      output_per_million_usd: 0.0
    strong_pricing:
      input_per_million_usd: 0.0
      output_per_million_usd: 0.0

context_limits:
  claude-opus-4-20250514: 200000
  claude-sonnet-4-20250514: 200000
  claude-sonnet-4-6: 200000
